<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Fantasy Scout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .teren-fotbal {
            background-color: #2e8b57;
            border: 3px solid white;
            border-radius: 10px;
            min-height: 400px;
            padding: 20px;
            position: relative;
        }
        .jucator-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .buget-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">⚽ AI Fantasy Scout</h1>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Clubul Tău</h4>
                    <span class="fs-5 text-success font-monospace" th:text="${buget_formatat}"></span>
                </div>
                <div class="card-body">
                    <div class="progress mb-4" style="height: 25px;">
                        <div class="progress-bar bg-success buget-bar" role="progressbar"
                             th:style="'width: ' + ${procent_buget} + '%'">
                            Fonduri Rămase
                        </div>
                    </div>

                    <div class="teren-fotbal shadow-inner">
                        <div th:if="${echipa.empty}" class="text-white text-center mt-5">
                            <h5>Terenul este gol!</h5>
                            <p>Folosește formularul din dreapta pentru a cere AI-ului să evalueze un transfer.</p>
                        </div>

                        <div class="row">
                            <div class="col-6" th:each="jucator : ${echipa}">
                                <div class="jucator-card">
                                    <span th:text="${jucator.nume}" class="text-primary fs-6"></span><br>
                                    <small class="text-muted" th:text="${jucator.pozitie}"></small><br>
                                    <span class="badge bg-success mt-1" th:text="${jucator.pret}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow border-primary">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">🤖 Consultă Scouter-ul AI</h4>
                </div>
                <div class="card-body">

                    <div th:if="${mesaj_succes}" class="alert alert-success fw-bold" th:text="${mesaj_succes}"></div>
                    <div th:if="${mesaj_eroare}" class="alert alert-danger fw-bold" th:text="${mesaj_eroare}"></div>

                    <form action="/evalueaza-si-cumpara" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nume Jucător:</label>
                            <input type="text" name="nume" class="form-control" placeholder="ex: Lamine Yamal" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Vârsta:</label>
                                <input type="number" name="varsta" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Poziția:</label>
                                <select name="pozitie" class="form-select" required>
                                    <option value="Goalkeeper">Portar (Goalkeeper)</option>
                                    <option value="Centre-Back">Fundaș Central</option>
                                    <option value="Central Midfield">Mijlocaș Central</option>
                                    <option value="Left Winger">Extremă Stânga</option>
                                    <option value="Centre-Forward">Atacant (Centre-Forward)</option>
                                </select>
                            </div>
                        </div>

                        <div class="row bg-light p-2 rounded mb-3 border">
                            <div class="col-md-6 mb-2 mb-md-0">
                                <label class="form-label fw-bold text-primary">Rating FIFA (OVR):</label>
                                <input type="number" name="ovr" class="form-control border-primary" value="80" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-primary">Potențial FIFA (POT):</label>
                                <input type="number" name="pot" class="form-control border-primary" value="85" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-bold">Meciuri sezon:</label>
                                <input type="number" name="meciuri" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-bold">Goluri:</label>
                                <input type="number" name="goluri" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-bold">Pase de Gol:</label>
                                <input type="number" name="pase" class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">
                            Calculează Prețul & Ofertează
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
